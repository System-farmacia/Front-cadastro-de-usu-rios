<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>FarmaSync-Login</title>
</head>
<body>
    <header>
        <img src="img/logo.png" alt="Logo" class="logotipo">
    </header>

    <main>
        <div class="container">
            <!-- LOGIN -->
            <div class="content first-content">
                <!-- PARTE VERDE -->
                <div class="first-column">
                    <h2 class="title title-primary">Bem-vindo de volta!</h2>
                    <p class="description">continue com seu login</p>
                    <p class="description">alguma coisa</p>
                    <button class="btn">login</button>
                </div>
                <!-- PARTE BRANCA -->
                <div class="second-column">
                    <h2 class="title title-second">Crie sua conta</h2>
                    <!-- SOCIAL MIDIA -->
                    <div class="social-midia">
                        <ul class="list-social-midia">
                            <li class="item-social-midia"><a href="#">
                                <i class="fa-brands fa-facebook-f"></i></a>
                            </li>
                            <li class="item-social-midia">
                                <a href="#"><i class="fa-brands fa-google-plus-g"></i></a>
                            </li>
                            <li class="item-social-midia">
                                <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                            </li>
                        </ul>
                    </div>
                    <p class="description description-column2">ou utilize seu e-mail para cadastrar</p>
                    <form class="form">
                        <input type="cpf" placeholder="CPF">
                        <input type="nome" placeholder="Nome">  <!-- PLACEHOLDER serve para deixar algo escrito dento do input-->
                        <input type="email" placeholder="E-mail">
                        <div class="form-dados">
                            <input type="genero" placeholder="Genero">
                            <input type="peso" placeholder="Peso">
                        </div>
                        <div class="form-endereco">
                            <input type="rua" placeholder="Rua">
                            <input type="bairro" placeholder="Bairro">
                            <input type="cidade" placeholder="Cidade">
                            <input type="estado" placeholder="Estado">
                            <input type="cep" placeholder="Cep">
                        </div>
                        <input type="date" placeholder="Data de Nascimento">
                        <input type="password" minlength="8" placeholder="Senha" required>
                        <button class="btn btn-colmn2">Cadastrar</button>
                    </form>
                </div>
            </div>

            <!-- CADASTRO -->
            <div class="content second-content"> 
                <div class="first-column">
                    <h2 class="title">Sua primeira vez aqui?</h2>
                    <p class="description">crie sua conta para ter acesso aos melhores produtos</p>
                    <button class="btn">cadastrar</button>
                </div>
                <div class="second-column">
                    <h2>Faça seu login</h2>
                    <div class="socialmidia">
                        <ul class="list-social-midia">
                            <li><a href="#">Facebook</a></li>
                            <li><a href="#">Google</a></li>
                            <li><a href="#">Linkedin</a></li>
                        </ul>
                    </div>
                    <p class="description">Ou utilize seu e-mail da conta</p></p>
                    <form class="form">
                        <input type="email" placeholder="E-mail">
                        <input type="senha" placeholder="Senha">
                        <a href="#">Esqueci minha senha</a>
                        <button class="btn">Login</button>
                    </form>
                </div>~
            </div>
        </div>
    </main>
</body>
</html>
